version: '3.9'
services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - '8000:8000'
    depends_on:
      - db
      - redis
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: albaniashop
      POSTGRES_USER: albaniashop
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
