{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<div class="max-w-2xl mx-auto surface p-7 text-center">
  <span class="badge badge-stock">{% trans "Order Confirmed" %}</span>
  <h1 class="text-3xl font-bold mt-3">{% trans "Thank you for your purchase" %}</h1>
  <p class="mt-3 text-slate-600">{% trans "Your order number:" %} <strong>{{ order.order_number }}</strong></p>
  <div class="mt-5 flex flex-wrap justify-center gap-2">
    <a href="{% url 'accounts:order_history' %}" class="btn btn-primary">{% trans "See Orders" %}</a>
    <a href="{% url 'core:all_products' %}" class="btn btn-secondary">{% trans "Continue Shopping" %}</a>
  </div>
</div>
{% endblock %}
