{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Login" %}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto surface p-6">
  <h1 class="text-2xl font-bold mb-4">{% trans "Login" %}</h1>
  <form method="post" class="space-y-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary w-full" type="submit">{% trans "Login" %}</button>
  </form>
  <p class="text-sm text-slate-500 mt-4">{% trans "New here?" %} <a class="text-[var(--brand-700)] font-semibold" href="{% url 'accounts:register' %}">{% trans "Create account" %}</a></p>
</div>
{% endblock %}
