{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">{% trans "My Favorites" %}</h1>
<div class="grid md:grid-cols-4 gap-4">
{% for item in items %}
  <a href="{{ item.product.get_absolute_url }}" class="product-card p-4">
    <h3 class="font-semibold">{{ item.product.name }}</h3>
    <p class="text-sm">{{ item.product.current_price }}</p>
  </a>
{% empty %}
  <div class="surface p-4">{% trans "No favorite products." %}</div>
{% endfor %}
</div>
{% endblock %}
